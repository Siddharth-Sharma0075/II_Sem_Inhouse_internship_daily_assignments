<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Navigation Bar and Cards</title>

<link rel="stylesheet" href="style.css">

</head>
<body>

<nav>
    <div class="logo">My Website</div>

    <ul>
        <li><a href="#">Home</a></li>
        <li><a href="#">About</a></li>
        <li><a href="#">Services</a></li>
        <li><a href="#">Contact</a></li>
    </ul>
</nav>

<div class="container">

    <div class="card">
        <img src="html.jpg" alt="HTML">
        <h2>HTML</h2>
        <p>Learn HTML to build the structure of web pages.</p>
        <button>Read More</button>
    </div>

    <div class="card">
        <img src="css.jpg" alt="CSS">
        <h2>CSS</h2>
        <p>Use CSS to make your website beautiful and responsive.</p>
        <button>Read More</button>
    </div>

    <div class="card">
        <img src="js.jpg" alt="JavaScript">
        <h2>JavaScript</h2>
        <p>Add interactivity and dynamic features to your website.</p>
        <button>Read More</button>
    </div>

</div>

</body>
</html>
